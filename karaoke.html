<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎤 Karaoke Detector Corregido</title>
  <style>
    * { box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
      padding: 20px;
    }

    .karaoke-container {
      background: white;
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      max-width: 650px;
      width: 100%;
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .header h1 {
      margin: 0;
      color: #667eea;
      font-size: 28px;
    }

    .voice-type {
      display: inline-block;
      margin-top: 10px;
      padding: 8px 16px;
      background: #f0f0f0;
      border-radius: 20px;
      font-size: 14px;
      color: #666;
    }

    .voice-type.detected {
      background: #e8f5e9;
      color: #2e7d32;
    }

    .frequency-section {
      margin: 30px 0;
      padding: 20px;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      border-radius: 15px;
      text-align: center;
    }

    .current-frequency {
      font-size: 48px;
      font-weight: bold;
      color: #667eea;
      margin: 10px 0;
      font-family: 'Courier New', monospace;
    }

    .expected-frequency {
      font-size: 24px;
      color: #999;
      margin: 5px 0;
    }

    .trend-indicator {
      margin-top: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .trend-arrow {
      font-size: 24px;
      animation: pulse 0.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }

    .accuracy-section {
      margin: 30px 0;
    }

    .accuracy-label {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 14px;
      color: #666;
    }

    .accuracy-bar-container {
      width: 100%;
      height: 30px;
      background: #e0e0e0;
      border-radius: 15px;
      overflow: hidden;
    }

    .accuracy-bar {
      height: 100%;
      background: linear-gradient(90deg, #f44336, #ff9800, #4caf50);
      transition: width 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
      font-size: 12px;
    }

    .note-section {
      margin: 30px 0;
      padding: 20px;
      background: #f9f9f9;
      border-radius: 10px;
      text-align: center;
    }

    .note-expected {
      font-size: 32px;
      font-weight: bold;
      color: #667eea;
    }

    .note-feedback {
      padding: 10px 15px;
      margin-top: 10px;
      border-radius: 8px;
      font-weight: 600;
      background: #eceff1;
      color: #37474f;
    }

    .note-feedback.correct {
      background: #c8e6c9;
      color: #2e7d32;
    }

    .note-feedback.incorrect {
      background: #ffcdd2;
      color: #c62828;
    }

    .score-section {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px;
      border-radius: 15px;
      margin-top: 30px;
      text-align: center;
    }

    .score-value {
      font-size: 48px;
      font-weight: bold;
      margin: 10px 0;
    }

    .score-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-top: 15px;
    }

    .score-stat {
      padding: 10px;
      background: rgba(255,255,255,0.2);
      border-radius: 8px;
      font-size: 14px;
    }

    .score-stat-value {
      font-size: 20px;
      font-weight: bold;
    }

    .button-group {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    button {
      flex: 1;
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-start {
      background: #4caf50;
      color: white;
    }

    .btn-start:hover:not(:disabled) {
      background: #45a049;
      transform: translateY(-2px);
    }

    .btn-start:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .btn-stop {
      background: #f44336;
      color: white;
    }

    .btn-stop:hover {
      background: #da190b;
      transform: translateY(-2px);
    }

    .console-log {
      margin-top: 20px;
      padding: 10px;
      background: #f5f5f5;
      border-radius: 8px;
      font-size: 12px;
      font-family: monospace;
      max-height: 140px;
      overflow-y: auto;
      color: #333;
      display: none;
    }
  </style>
</head>
<body>
  <div class="karaoke-container">
    <div class="header">
      <h1>🎤 Karaoke Detector</h1>
      <div class="voice-type" id="voiceType">Detectando voz...</div>
    </div>

    <div class="frequency-section">
      <div class="current-frequency" id="currentFreq">-- Hz</div>
      <div class="expected-frequency">Esperada: <span id="expectedFreq">-- Hz</span></div>
      <div class="trend-indicator">
        <span style="font-weight: 600;">Movimiento:</span>
        <span class="trend-arrow" id="trendArrow">➡️</span>
      </div>
    </div>

    <div class="accuracy-section">
      <div class="accuracy-label">
        <span>Exactitud</span>
        <span id="accuracyText">0%</span>
      </div>
      <div class="accuracy-bar-container">
        <div class="accuracy-bar" id="accuracyBar" style="width: 0%"></div>
      </div>
    </div>

    <div class="note-section">
      <div class="note-expected" id="noteExpected">C4</div>
      <div style="font-size: 12px; color: #999; margin-top: 5px;">Nota esperada</div>
      <div class="note-feedback" id="noteFeedback">Esperando audio...</div>
    </div>

    <div class="score-section">
      <div>Puntuación</div>
      <div class="score-value" id="totalScore">0</div>
      <div class="score-stats">
        <div class="score-stat">
          <div>Notas Correctas</div>
          <div class="score-stat-value" id="notesHit">0</div>
        </div>
        <div class="score-stat">
          <div>Notas Falladas</div>
          <div class="score-stat-value" id="notesMissed">0</div>
        </div>
      </div>
    </div>

    <div class="button-group">
      <button class="btn-start" id="startBtn">Iniciar</button>
      <button class="btn-stop" id="stopBtn" style="display:none;">Detener</button>
    </div>

    <div class="console-log" id="consoleLog"></div>
  </div>

  <script>
    const NOTES = {
      C3: 130.81, D3: 146.83, E3: 164.81,
      F3: 174.61, G3: 196.00, A3: 220.00, B3: 246.94,
      C4: 261.63, D4: 293.66, E4: 329.63,
      F4: 349.23, G4: 392.00, A4: 440.00, B4: 493.88,
      C5: 523.25, D5: 587.33, E5: 659.25
    };

    class Logger {
      constructor(element) {
        this.element = element;
      }

      log(message, isError = false) {
        this.element.style.display = 'block';
        const line = document.createElement('div');
        line.innerHTML = isError
          ? `<span style="color:red;">❌ ${message}</span>`
          : `ℹ️ ${message}`;
        this.element.appendChild(line);
        this.element.scrollTop = this.element.scrollHeight;

        if (isError) console.error(message);
        else console.log(message);
      }

      clear() {
        this.element.innerHTML = '';
      }
    }

    class PitchDetector {
      constructor(sampleRate) {
        this.sampleRate = sampleRate;
        this.noiseThreshold = 0.01;
        this.previousFrequencies = [];
        this.frequencyTrend = [];
      }

      detectPitch(samples) {
        if (!samples || samples.length < 1024) return null;

        const rms = this.calculateRMS(samples);
        if (rms < this.noiseThreshold) return null;

        const windowed = this.applyHannWindow(samples);
        const frequency = this.yin(windowed);

        if (!frequency) return null;
        if (frequency < 80 || frequency > 700) return null;

        return this.smoothFrequency(frequency);
      }

      calculateRMS(samples) {
        let sum = 0;
        for (let i = 0; i < samples.length; i++) {
          sum += samples[i] * samples[i];
        }
        return Math.sqrt(sum / samples.length);
      }

      applyHannWindow(buffer) {
        const result = new Float32Array(buffer.length);
        const n = buffer.length;

        for (let i = 0; i < n; i++) {
          const w = 0.5 * (1 - Math.cos((2 * Math.PI * i) / (n - 1)));
          result[i] = buffer[i] * w;
        }
        return result;
      }

      yin(buffer) {
        const bufferSize = buffer.length;
        const maxPeriod = Math.floor(bufferSize / 2);
        const minPeriod = Math.floor(this.sampleRate / 700);
        const maxValidPeriod = Math.floor(this.sampleRate / 80);

        const yinBuffer = new Float32Array(maxPeriod);
        yinBuffer[0] = 1;

        let runningSum = 0;

        for (let tau = 1; tau < maxPeriod; tau++) {
          let difference = 0;

          for (let i = 0; i < bufferSize - tau; i++) {
            const delta = buffer[i] - buffer[i + tau];
            difference += delta * delta;
          }

          runningSum += difference;
          yinBuffer[tau] = runningSum === 0 ? 1 : difference / (runningSum / tau);
        }

        const threshold = 0.15;
        let tauEstimate = -1;

        for (let tau = minPeriod; tau < Math.min(maxPeriod, maxValidPeriod); tau++) {
          if (yinBuffer[tau] < threshold) {
            while (tau + 1 < maxPeriod && yinBuffer[tau + 1] < yinBuffer[tau]) {
              tau++;
            }
            tauEstimate = tau;
            break;
          }
        }

        if (tauEstimate === -1) return null;

        const betterTau = tauEstimate + this.parabolicInterpolation(yinBuffer, tauEstimate);
        if (betterTau <= 0) return null;

        return this.sampleRate / betterTau;
      }

      parabolicInterpolation(buffer, index) {
        if (index <= 0 || index >= buffer.length - 1) return 0;

        const x0 = buffer[index - 1];
        const x1 = buffer[index];
        const x2 = buffer[index + 1];

        const denominator = (2 * x1) - x2 - x0;
        if (denominator === 0) return 0;

        return 0.5 * (x2 - x0) / denominator;
      }

      smoothFrequency(frequency) {
        this.previousFrequencies.push(frequency);
        this.frequencyTrend.push(frequency);

        if (this.previousFrequencies.length > 5) this.previousFrequencies.shift();
        if (this.frequencyTrend.length > 12) this.frequencyTrend.shift();

        return this.previousFrequencies.reduce((a, b) => a + b, 0) / this.previousFrequencies.length;
      }

      getTrend() {
        if (this.frequencyTrend.length < 4) return 'stable';

        const recent = this.frequencyTrend.slice(-4);
        const oldAvg = (recent[0] + recent[1]) / 2;
        const newAvg = (recent[2] + recent[3]) / 2;
        const diff = newAvg - oldAvg;

        if (Math.abs(diff) < 2) return 'stable';
        return diff > 0 ? 'up' : 'down';
      }

      detectVoiceType(frequency) {
        if (!frequency) return 'unknown';
        return frequency < 165 ? 'grave' : 'aguda';
      }
    }

    class ScoreEngine {
      constructor() {
        this.totalScore = 0;
        this.notesHit = 0;
        this.notesMissed = 0;
      }

      evaluate(detectedFreq, expectedNote) {
        const expectedFreq = NOTES[expectedNote];
        if (!detectedFreq || !expectedFreq) {
          return {
            detected: null,
            expected: expectedFreq ? expectedFreq.toFixed(1) : '--',
            accuracy: 0,
            isCorrect: false
          };
        }

        const cents = 1200 * Math.log2(detectedFreq / expectedFreq);
        const accuracy = Math.max(0, 1 - Math.abs(cents) / 50);
        const isCorrect = accuracy >= 0.85;

        return {
          detected: detectedFreq.toFixed(1),
          expected: expectedFreq.toFixed(1),
          accuracy: Math.round(accuracy * 100),
          isCorrect,
          cents
        };
      }

      registerResult(result) {
        if (result.isCorrect) {
          this.notesHit++;
          this.totalScore += result.accuracy;
        } else {
          this.notesMissed++;
        }
      }

      reset() {
        this.totalScore = 0;
        this.notesHit = 0;
        this.notesMissed = 0;
      }
    }

    class AudioEngine {
      constructor() {
        this.audioContext = null;
        this.analyser = null;
        this.source = null;
        this.stream = null;
      }

      async init() {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          throw new Error('Este navegador no soporta getUserMedia');
        }

        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        if (!AudioContextClass) {
          throw new Error('Este navegador no soporta Web Audio API');
        }

        this.stream = await navigator.mediaDevices.getUserMedia({
          audio: {
            echoCancellation: false,
            noiseSuppression: false,
            autoGainControl: false
          }
        });

        this.audioContext = new AudioContextClass();

        if (!this.audioContext || typeof this.audioContext.createAnalyser !== 'function') {
          throw new Error('No se pudo crear un AudioContext válido');
        }

        if (this.audioContext.state === 'suspended') {
          await this.audioContext.resume();
        }

        this.analyser = this.audioContext.createAnalyser();
        this.analyser.fftSize = 4096;
        this.analyser.smoothingTimeConstant = 0.1;

        if (typeof this.audioContext.createMediaStreamSource !== 'function') {
          throw new Error('createMediaStreamSource no está disponible en este navegador');
        }

        this.source = this.audioContext.createMediaStreamSource(this.stream);
        this.source.connect(this.analyser);

        return {
          sampleRate: this.audioContext.sampleRate
        };
      }

      getTimeDomainData() {
        if (!this.analyser) return null;

        const data = new Float32Array(this.analyser.fftSize);
        this.analyser.getFloatTimeDomainData(data);
        return data;
      }

      async stop() {
        if (this.source) {
          try { this.source.disconnect(); } catch {}
          this.source = null;
        }

        if (this.analyser) {
          try { this.analyser.disconnect(); } catch {}
          this.analyser = null;
        }

        if (this.stream) {
          this.stream.getTracks().forEach(track => track.stop());
          this.stream = null;
        }

        if (this.audioContext) {
          await this.audioContext.close();
          this.audioContext = null;
        }
      }
    }

    class KaraokeApp {
      constructor() {
        this.logger = new Logger(document.getElementById('consoleLog'));
        this.audioEngine = new AudioEngine();
        this.pitchDetector = null;
        this.scoreEngine = new ScoreEngine();

        this.songNotes = ['C4', 'D4', 'E4', 'F4', 'G4', 'A4', 'B4', 'C5'];
        this.currentNoteIndex = 0;
        this.noteDurationMs = 2000;
        this.lastNoteChange = 0;
        this.isRunning = false;
        this.animationId = null;

        this.cacheElements();
        this.bindEvents();
        this.renderInitialState();
      }

      cacheElements() {
        this.startBtn = document.getElementById('startBtn');
        this.stopBtn = document.getElementById('stopBtn');
        this.voiceTypeEl = document.getElementById('voiceType');
        this.currentFreqEl = document.getElementById('currentFreq');
        this.expectedFreqEl = document.getElementById('expectedFreq');
        this.noteExpectedEl = document.getElementById('noteExpected');
        this.noteFeedbackEl = document.getElementById('noteFeedback');
        this.accuracyTextEl = document.getElementById('accuracyText');
        this.accuracyBarEl = document.getElementById('accuracyBar');
        this.trendArrowEl = document.getElementById('trendArrow');
        this.totalScoreEl = document.getElementById('totalScore');
        this.notesHitEl = document.getElementById('notesHit');
        this.notesMissedEl = document.getElementById('notesMissed');
      }

      bindEvents() {
        this.startBtn.addEventListener('click', () => this.start());
        this.stopBtn.addEventListener('click', () => this.stop());
      }

      renderInitialState() {
        const note = this.songNotes[this.currentNoteIndex];
        this.noteExpectedEl.textContent = note;
        this.expectedFreqEl.textContent = `${NOTES[note].toFixed(1)} Hz`;
      }

      async start() {
        try {
          this.logger.log('Iniciando karaoke...');
          this.startBtn.disabled = true;

          const { sampleRate } = await this.audioEngine.init();

          this.pitchDetector = new PitchDetector(sampleRate);
          this.scoreEngine.reset();
          this.currentNoteIndex = 0;
          this.lastNoteChange = performance.now();
          this.isRunning = true;

          this.startBtn.style.display = 'none';
          this.stopBtn.style.display = 'block';

          this.logger.log('Micrófono permitido');
          this.logger.log('Motor de audio iniciado');
          this.logger.log('Detección activa');

          this.loop();
        } catch (error) {
          this.logger.log(error.message || 'Error al iniciar', true);
          this.startBtn.disabled = false;
        }
      }

      async stop() {
        this.isRunning = false;

        if (this.animationId) {
          cancelAnimationFrame(this.animationId);
          this.animationId = null;
        }

        await this.audioEngine.stop();

        this.startBtn.style.display = 'block';
        this.startBtn.style.display = 'block';
        this.startBtn.disabled = false;
        this.stopBtn.style.display = 'none';

        this.logger.log('Karaoke detenido');
      }

      loop = () => {
        if (!this.isRunning) return;

        const now = performance.now();

        if (now - this.lastNoteChange >= this.noteDurationMs) {
          this.currentNoteIndex = (this.currentNoteIndex + 1) % this.songNotes.length;
          this.lastNoteChange = now;
        }

        const expectedNote = this.songNotes[this.currentNoteIndex];
        const samples = this.audioEngine.getTimeDomainData();
        const frequency = this.pitchDetector.detectPitch(samples);

        this.noteExpectedEl.textContent = expectedNote;
        this.expectedFreqEl.textContent = `${NOTES[expectedNote].toFixed(1)} Hz`;

        if (frequency) {
          const result = this.scoreEngine.evaluate(frequency, expectedNote);
          this.scoreEngine.registerResult(result);

          this.updateVoiceType(this.pitchDetector.detectVoiceType(frequency));
          this.updateTrend(this.pitchDetector.getTrend());
          this.updateDetectionUI(result);
        } else {
          this.updateNoSignalUI();
        }

        this.updateScoreUI();
        this.animationId = requestAnimationFrame(this.loop);
      };

      updateVoiceType(type) {
        if (type === 'unknown') {
          this.voiceTypeEl.className = 'voice-type';
          this.voiceTypeEl.textContent = 'Detectando voz...';
          return;
        }

        this.voiceTypeEl.className = 'voice-type detected';
        this.voiceTypeEl.textContent = type === 'grave'
          ? '🎙️ Voz grave'
          : '🎤 Voz aguda';
      }

      updateTrend(trend) {
        if (trend === 'up') {
          this.trendArrowEl.textContent = '📈';
        } else if (trend === 'down') {
          this.trendArrowEl.textContent = '📉';
        } else {
          this.trendArrowEl.textContent = '➡️';
        }
      }

      updateDetectionUI(result) {
        this.currentFreqEl.textContent = result.detected ? `${result.detected} Hz` : '-- Hz';
        this.accuracyTextEl.textContent = `${result.accuracy}%`;
        this.accuracyBarEl.style.width = `${result.accuracy}%`;
        this.accuracyBarEl.textContent = result.accuracy > 10 ? `${result.accuracy}%` : '';

        if (result.isCorrect) {
          this.noteFeedbackEl.className = 'note-feedback correct';
          this.noteFeedbackEl.textContent = '✅ ¡Nota correcta!';
        } else {
          this.noteFeedbackEl.className = 'note-feedback incorrect';
          this.noteFeedbackEl.textContent = result.cents > 0
            ? '⬇️ Vas un poco alto'
            : '⬆️ Vas un poco bajo';
        }
      }

      updateNoSignalUI() {
        this.currentFreqEl.textContent = '-- Hz';
        this.accuracyTextEl.textContent = '0%';
        this.accuracyBarEl.style.width = '0%';
        this.accuracyBarEl.textContent = '';
        this.noteFeedbackEl.className = 'note-feedback';
        this.noteFeedbackEl.textContent = '🔇 Sin señal de voz';
        this.updateTrend('stable');
      }

      updateScoreUI() {
        this.totalScoreEl.textContent = this.scoreEngine.totalScore;
        this.notesHitEl.textContent = this.scoreEngine.notesHit;
        this.notesMissedEl.textContent = this.scoreEngine.notesMissed;
      }
    }

    const app = new KaraokeApp();
    console.log('Script cargado correctamente');
  </script>
</body>
</html>
